<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>EduManager - Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" th:href="@{/cursos}">EduManager</a>
            <div class="navbar-text text-light me-auto ms-3">
                <i class="bi bi-person-circle"></i> <span th:text="${#authentication.name}"></span>
            </div>
            <form th:action="@{/logout}" method="post"><button class="btn btn-outline-danger btn-sm">Salir</button></form>
        </div>
    </nav>

    <div class="container">
        <div sec:authorize="hasRole('ADMIN')" class="card border-0 shadow-sm mb-4">
            <div class="card-body d-flex justify-content-between align-items-center bg-white rounded">
                <h5 class="mb-0">Administración:</h5>
                <div class="btn-group">
                    <a th:href="@{/nuevo-curso}" class="btn btn-primary"><i class="bi bi-journal-plus"></i> Nuevo Curso</a>
                    <a th:href="@{/nuevo-estudiante}" class="btn btn-info text-white"><i class="bi bi-person-plus"></i> Estudiante</a>
                    <a th:href="@{/admin/usuarios}" class="btn btn-secondary"><i class="bi bi-people"></i> Usuarios</a>
                    <a th:href="@{/admin/solicitudes}" class="btn btn-warning"><i class="bi bi-list-check"></i> Solicitudes</a>
                    <a th:href="@{/admin/notas}" class="btn btn-dark"><i class="bi bi-file-earmark-spreadsheet"></i> Notas</a>
                </div>
            </div>
        </div>

        <div class="row">
            <div th:class="${#authorization.expression('hasRole(''USER'')') ? 'col-md-8' : 'col-md-12'}">
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white"><h5>Cursos del Sistema</h5></div>
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0">
                            <thead class="table-light"><tr><th>Título</th><th>Descripción</th><th>Acciones</th></tr></thead>
                            <tbody>
                                <tr th:each="curso : ${cursos}">
                                    <td th:text="${curso.titulo}" class="fw-bold"></td>
                                    <td th:text="${curso.descripcion}"></td>
                                    <td>
                                        <div sec:authorize="hasRole('USER')">
                                            <div th:each="sol : ${solicitudesUsuario}" th:if="${sol.curso.id == curso.id}">
                                                <span th:classappend="${sol.estado == 'PENDIENTE' ? 'badge bg-warning text-dark' : (sol.estado == 'APROBADO' ? 'badge bg-success' : 'badge bg-danger')}" th:text="${sol.estado}"></span>
                                            </div>
                                            <a th:if="${#lists.isEmpty(solicitudesUsuario.?[curso.id == __${curso.id}__])}" 
                                               th:href="@{/inscribir/{id}(id=${curso.id})}" class="btn btn-outline-primary btn-sm">Inscribirme</a>
                                        </div>
                                        <div sec:authorize="hasRole('ADMIN')" class="btn-group">
                                            <a th:href="@{/admin/cursos/editar/{id}(id=${curso.id})}" class="btn btn-sm btn-outline-secondary">Editar</a>
                                            <a th:href="@{/admin/cursos/eliminar/{id}(id=${curso.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Borrar curso?')">Borrar</a>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-md-4" sec:authorize="hasRole('USER')">
                <div class="card shadow border-0">
                    <div class="card-header bg-success text-white"><h5>Mis Notas</h5></div>
                    <div class="card-body">
                        <ul class="list-group list-group-flush">
                            <li th:each="nota : ${misNotas}" class="list-group-item d-flex justify-content-between border-0 border-bottom">
                                <span th:text="${nota.curso.titulo}"></span>
                                <span class="badge bg-primary rounded-pill" th:text="${nota.nota}"></span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

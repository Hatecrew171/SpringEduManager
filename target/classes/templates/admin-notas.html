<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EduManager - Historial de Notas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4 shadow">
        <div class="container"><a class="navbar-brand text-primary fw-bold" th:href="@{/cursos}">EduManager</a></div>
    </nav>
    <div class="container">
        <div class="card shadow border-0">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Registro General de Calificaciones</h5>
                <a th:href="@{/cursos}" class="btn btn-sm btn-outline-light">Volver</a>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr><th>Estudiante</th><th>Curso</th><th>Test</th><th>Nota</th><th>Acción</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="n : ${notas}">
                            <td th:text="${n.estudiante.nombre}"></td>
                            <td th:text="${n.curso.titulo}"></td>
                            <td th:text="${n.nombreTest}"></td>
                            <td><span class="badge bg-primary rounded-pill" th:text="${n.nota}"></span></td>
                            <td>
                                <a th:href="@{/admin/notas/eliminar/{id}(id=${n.id})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar esta nota?')">Eliminar</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>

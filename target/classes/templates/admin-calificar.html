<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EduManager - Calificar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4 shadow">
        <div class="container"><a class="navbar-brand text-primary fw-bold" th:href="@{/cursos}">EduManager</a></div>
    </nav>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-dark text-white"><h4>Registrar Evaluación</h4></div>
                    <div class="card-body">
                        <div class="alert alert-info">
                            <strong>Estudiante:</strong> <span th:text="${inscripcion.estudiante.nombre}"></span><br>
                            <strong>Curso:</strong> <span th:text="${inscripcion.curso.titulo}"></span>
                        </div>
                        <form th:action="@{/admin/guardar-nota}" method="post">
                            <input type="hidden" name="estudianteId" th:value="${inscripcion.estudiante.id}">
                            <input type="hidden" name="cursoId" th:value="${inscripcion.curso.id}">
                            
                            <div class="mb-3">
                                <label class="form-label">Nombre de la Evaluación</label>
                                <input type="text" name="nombreTest" class="form-control" placeholder="Ej: Examen Final" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Nota (0-100)</label>
                                <input type="number" name="nota" class="form-control" min="0" max="100" required>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Guardar Nota</button>
                                <a th:href="@{/admin/solicitudes}" class="btn btn-outline-secondary">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

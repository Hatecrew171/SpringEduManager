<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EduManager - Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4 shadow">
        <div class="container"><a class="navbar-brand text-primary fw-bold" th:href="@{/cursos}">EduManager</a></div>
    </nav>
    <div class="container">
        <div class="card shadow border-0">
            <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Usuarios Registrados</h5>
                <a th:href="@{/cursos}" class="btn btn-sm btn-outline-light">Volver</a>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr><th>Nombre</th><th>Email (Username)</th><th>Rol</th><th>Acciones</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${usuarios}">
                            <td th:text="${u.nombre}"></td>
                            <td th:text="${u.email}" class="fw-bold"></td>
                            <td><span class="badge bg-secondary">ESTUDIANTE</span></td>
                            <td>
                                <div class="btn-group">
                                    <a th:href="@{/admin/estudiantes/editar/{id}(id=${u.id})}" class="btn btn-sm btn-outline-warning text-dark">Editar</a>
                                    <a th:href="@{/admin/estudiantes/eliminar/{id}(id=${u.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Borrar estudiante?')">Borrar</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>

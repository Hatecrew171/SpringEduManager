<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Solicitudes - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4 shadow">
        <div class="container"><a class="navbar-brand text-primary fw-bold" th:href="@{/cursos}">EduManager</a></div>
    </nav>
    <div class="container">
        <div class="card shadow border-0">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Solicitudes Pendientes</h5>
                <a th:href="@{/cursos}" class="btn btn-sm btn-outline-light">Volver</a>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-secondary">
                        <tr><th>Estudiante</th><th>Curso</th><th>Estado</th><th>Motivo</th><th>Acción</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="sol : ${solicitudes}">
                            <td th:text="${sol.estudiante.nombre}"></td>
                            <td th:text="${sol.curso.titulo}"></td>
                            <td><span th:text="${sol.estado}" th:classappend="${sol.estado == 'PENDIENTE' ? 'badge bg-warning text-dark' : (sol.estado == 'APROBADO' ? 'badge bg-success' : 'badge bg-danger')}"></span></td>
                            <td th:text="${sol.motivo}" class="text-muted small italic"></td>
                            <td>
                                <form th:if="${sol.estado == 'PENDIENTE'}" th:action="@{/admin/gestionar}" method="post" class="d-flex gap-1">
                                    <input type="hidden" name="id" th:value="${sol.id}">
                                    <input type="text" name="motivo" class="form-control form-control-sm" placeholder="Comentario">
                                    <button name="estado" value="APROBADO" class="btn btn-success btn-sm">Aprobar</button>
                                    <button name="estado" value="RECHAZADO" class="btn btn-danger btn-sm">Rechazar</button>
                                </form>
                                <a th:if="${sol.estado == 'APROBADO'}" th:href="@{/admin/calificar/{id}(id=${sol.id})}" class="btn btn-primary btn-sm">Poner Nota</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>

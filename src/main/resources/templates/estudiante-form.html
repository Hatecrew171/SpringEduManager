<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EduManager - Registro Estudiante</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4 shadow">
        <div class="container"><a class="navbar-brand text-primary fw-bold" th:href="@{/cursos}">EduManager</a></div>
    </nav>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-info text-white"><h4>Datos del Estudiante</h4></div>
                    <div class="card-body">
                        <form th:action="@{/guardar-estudiante}" th:object="${estudiante}" method="post">
                            <input type="hidden" th:field="*{id}">
                            <div class="mb-3">
                                <label class="form-label">Nombre Completo</label>
                                <input type="text" th:field="*{nombre}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Correo Electrónico (Será su usuario)</label>
                                <input type="email" th:field="*{email}" class="form-control" required>
                            </div>
                            <div class="alert alert-secondary py-2 small">La clave por defecto será: <strong>user123</strong></div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-info text-white w-100">Registrar Alumno</button>
                                <a th:href="@{/cursos}" class="btn btn-outline-secondary w-100">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
